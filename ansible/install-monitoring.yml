---
- name: Install and Configure Node Exporter for Telemetry
  hosts: production
  become: yes
  tasks:
    - name: Ensure Prometheus user exists
      user:
        name: node_exporter
        shell: /bin/false
        create_home: no
        state: present

    - name: Download Node Exporter binary
      get_url:
        url: https://github.com/prometheus/node_exporter/releases/download/v1.7.0/node_exporter-1.7.0.linux-amd64.tar.gz
        dest: /tmp/node_exporter.tar.gz

    - name: Unarchive Node Exporter installation files
      unarchive:
        src: /tmp/node_exporter.tar.gz
        dest: /tmp
        remote_src: yes

    - name: Copy Node Exporter binary to system bin
      copy:
        src: /tmp/node_exporter-1.7.0.linux-amd64/node_exporter
        dest: /usr/local/bin/node_exporter
        mode: '0755'
        remote_src: yes

    - name: Setup Node Exporter Systemd Service
      copy:
        dest: /etc/systemd/system/node_exporter.service
        content: |
          [Unit]
          Description=Node Exporter
          Wants=network-online.target
          After=network-online.target

          [Service]
          User=node_exporter
          Group=node_exporter
          Type=simple
          ExecStart=/usr/local/bin/node_exporter

          [Install]
          WantedBy=multi-user.target

    - name: Reload systemd, start and enable Node Exporter
      systemd:
        name: node_exporter
        state: restarted
        enabled: yes
        daemon_reload: yes
