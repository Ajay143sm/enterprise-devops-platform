<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise Web Application Platform</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f9;
            color: #333;
            margin: 0;
            padding: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 80vh;
        }
        .container {
            background-color: #ffffff;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            max-width: 600px;
            text-align: center;
            border-top: 5px solid #232f3e; /* AWS Squid Ink color */
        }
        h1 { color: #232f3e; margin-bottom: 10px; }
        p { color: #666; font-size: 1.1em; line-height: 1.6; }
        .badge {
            background-color: #2ec4b6;
            color: white;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: bold;
            display: inline-block;
            margin-top: 15px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Enterprise App Deployment Platform</h1>
        <p>This application was successfully deployed using a fully automated GitOps CI/CD pipeline.</p>
        <p><strong>Stack:</strong> AWS • Terraform • Ansible • Jenkins • Docker • Nginx • Prometheus • Grafana</p>
        <span class="badge">Deployment Status: HEALTHY</span>
    </div>
</body>
</html>
